# ============================================================================
# TTC 4-Pipeline All-in-One — WSL2 (Windows) 기동 컴포즈
#
# 구성:
#   ttc-allinone : 통합 이미지 (Jenkins + Dify + SonarQube + PG/Redis/Qdrant)
#   gitlab       : GitLab CE 공식 이미지 (분리 서비스, 파이프라인 2/3 대상)
#   ttc-sandbox  : Dify Code 노드 격리 실행 sandbox (Dify Workflow 의 Code
#                  노드들이 의존). 통합 이미지에는 sandbox binary 가 없어 별도.
#
# 전제:
#   - Docker Desktop + WSL2 백엔드
#   - 호스트(WSL2 또는 Windows) 에 Ollama 데몬 실행 중 (11434 포트)
#   - 이미지 사전 빌드 (ttc-allinone:wsl2-<tag>)
#
# 포트 매핑 — 기존 Playwright 컨테이너(18080/18081/50001) 와 루트 스택(8080
# /9000/8929/3000/50000) 과 겹치지 않도록 28xxx / 50002 대역:
#   28080  Jenkins
#   28081  Dify gateway
#   29000  SonarQube
#   50002  Jenkins agent (JNLP)
#   28090  GitLab HTTP
#   28022  GitLab SSH
#
# 데이터 볼륨: ${HOME}/ttc-allinone-data
# ============================================================================

services:
  ttc-allinone:
    image: ${IMAGE:-ttc-allinone:wsl2-dev}
    container_name: ttc-allinone
    restart: unless-stopped
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Seoul
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:4b}
      JENKINS_PORT: "28080"
      JENKINS_AGENT_PORT: "50002"
      DIFY_GATEWAY_PORT: "28081"
      SONARQUBE_PORT: "29000"
      # provision.sh 가 GitLab root 비밀번호 설정 + PAT 발급에 사용
      GITLAB_URL_INTERNAL: "http://gitlab:80"
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-ChangeMe!Pass}
      # Dify Code 노드 sandbox endpoint. ttc-sandbox 컨테이너로 라우팅.
      CODE_EXECUTION_ENDPOINT: "http://ttc-sandbox:8194"
      CODE_EXECUTION_API_KEY: "${SANDBOX_API_KEY:-dify-sandbox}"
    ports:
      - "28080:28080"
      - "28081:28081"
      - "29000:9000"
      - "50002:50002"
    volumes:
      - ${HOME}/ttc-allinone-data/allinone:/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 6g
    networks:
      - ttc-net
    depends_on:
      gitlab:
        condition: service_started
      ttc-sandbox:
        condition: service_started

  ttc-sandbox:
    # Dify 1.13.x 호환 sandbox (langgenius/dify-sandbox:0.2.10).
    # ttc-allinone 의 dify-api 가 CODE_EXECUTION_ENDPOINT 로 호출.
    image: ${SANDBOX_IMAGE:-langgenius/dify-sandbox:0.2.10}
    container_name: ttc-sandbox
    restart: unless-stopped
    platform: linux/amd64
    environment:
      API_KEY: "${SANDBOX_API_KEY:-dify-sandbox}"
      GIN_MODE: "release"
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      SANDBOX_PORT: "8194"
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:8194/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ttc-net

  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:18.11.0-ce.0}
    container_name: ttc-gitlab
    restart: unless-stopped
    hostname: gitlab
    platform: linux/amd64
    # GitLab 초기화는 5-10분 소요. healthcheck 로 준비 상태 노출.
    environment:
      TZ: Asia/Seoul
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-ChangeMe!Pass}
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab'
        gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
        gitlab_rails['gitlab_signup_enabled'] = false
        gitlab_rails['gitlab_default_can_create_group'] = true
        # 리소스 절약 (팀 내부용 전제)
        puma['worker_processes'] = 2
        sidekiq['max_concurrency'] = 10
        prometheus_monitoring['enable'] = false
        gitlab_exporter['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        alertmanager['enable'] = false
        # grafana['enable'] = false  # GitLab 16.3+ 에서 grafana 옵션 제거됨 (#383951)
    ports:
      - "28090:80"
      - "28022:22"
    volumes:
      - ${HOME}/ttc-allinone-data/gitlab/config:/etc/gitlab
      - ${HOME}/ttc-allinone-data/gitlab/logs:/var/log/gitlab
      - ${HOME}/ttc-allinone-data/gitlab/data:/var/opt/gitlab
    shm_size: 256m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost/users/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4g
    networks:
      - ttc-net

networks:
  ttc-net:
    driver: bridge
    name: ttc-net
