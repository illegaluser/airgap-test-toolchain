sonar.projectKey=ttc-sample-app
sonar.projectName=ttc-sample-app

# Track 1 — Sonar 정적분석 대상. 운영 코드 (src) + frontend (JS) 분석.
sonar.sources=src,frontend
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# requirements/ 와 docs/ 는 코드분석 대상 아님 (traceability 파이프라인 전용).
sonar.exclusions=**/__pycache__/**,**/node_modules/**,requirements/**,docs/**

sonar.python.version=3.9
sonar.sourceEncoding=UTF-8
