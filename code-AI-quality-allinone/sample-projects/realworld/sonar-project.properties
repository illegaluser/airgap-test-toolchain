sonar.projectKey=realworld
sonar.projectName=realworld

# Spring Boot RealWorld — source-only 분석 (파이프라인 03 은 build step 없음).
# SonarQube 26.x Java 룰은 sonar.java.binaries 가 **실제 존재하는** 디렉토리 요구
# (단순 미지정 또는 source dir 로 fake = 즉시 fail). 빈 디렉토리를 binaries 로
# 지정하면 .class 부재 시 source-only fallback 으로 전환 → syntactic / 패턴 /
# null-check 룰 정상 작동, semantic 룰 (type 추론 필요한 NPE 등) 일부는 비활성.
# build/empty-classes/.gitkeep 동봉 — git 이 빈 디렉토리를 추적하지 못하므로.
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.test.inclusions=src/test/java/**/*.java
sonar.exclusions=**/build/**,**/.gradle/**,**/gradle/wrapper/**

sonar.java.binaries=build/empty-classes
sonar.java.source=11
sonar.sourceEncoding=UTF-8
