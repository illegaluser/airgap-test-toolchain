# ============================================================================
# TTC 4-Pipeline All-in-One — macOS 기동 컴포즈
#
# 구성:
#   ttc-allinone : 통합 이미지 (Jenkins + Dify + SonarQube + PG/Redis/Qdrant)
#   gitlab       : GitLab CE 공식 이미지 (분리 서비스)
#   ttc-sandbox  : Dify Code 노드 격리 실행 sandbox (Dify Workflow 의 context_filter
#                  / json_parser 같은 Code 노드가 의존). 통합 이미지에는 sandbox
#                  binary 가 없어 별도 컨테이너로 분리.
#
# 전제:
#   - Docker Desktop for Mac (Apple Silicon 기본)
#   - 호스트 Mac 에 Ollama 데몬 실행 중 (Metal GPU, 11434 포트)
#   - 이미지 사전 빌드 (ttc-allinone:mac-<tag>)
#
# 포트 매핑: 28080 / 28081 / 29000 / 50002 / 28090 / 28022
#   (상세는 docker-compose.wsl2.yaml 참고)
#
# 데이터 볼륨: ${HOME}/ttc-allinone-data
# ============================================================================

services:
  ttc-allinone:
    image: ${IMAGE:-ttc-allinone:mac-dev}
    container_name: ttc-allinone
    restart: unless-stopped
    platform: linux/arm64
    environment:
      TZ: Asia/Seoul
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      JENKINS_PORT: "28080"
      JENKINS_AGENT_PORT: "50002"
      DIFY_GATEWAY_PORT: "28081"
      SONARQUBE_PORT: "29000"
      GITLAB_URL_INTERNAL: "http://gitlab:80"
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-ChangeMe!Pass}
      # macOS Docker Desktop 의 grpcfuse bind mount 는 호스트 디스크 사용량을
      # 그대로 반영 → 호스트가 95% 이상일 때 ES flood_stage watermark 에 걸려
      # SonarQube 가 기동 중 사망한다. Sonar ES 인덱스만 overlay 로 이전해
      # 호스트 디스크 영향에서 분리. PG 에 있는 Sonar metadata 는 영속.
      # overlay 이므로 `docker compose down` 후 인덱스는 재생성.
      SONAR_DATA_HOST: "${SONAR_DATA_HOST:-/var/lib/sonarqube_data}"
      # Dify Code 노드 sandbox endpoint. ttc-sandbox 컨테이너로 라우팅.
      # entrypoint.sh 가 supervisord 환경으로 상속 → dify-api 가 자동 사용.
      CODE_EXECUTION_ENDPOINT: "http://ttc-sandbox:8194"
      CODE_EXECUTION_API_KEY: "${SANDBOX_API_KEY:-dify-sandbox}"
    ports:
      - "28080:28080"
      - "28081:28081"
      - "29000:9000"
      - "50002:50002"
    volumes:
      - ${HOME}/ttc-allinone-data/allinone:/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 6g
    networks:
      - ttc-net
    depends_on:
      gitlab:
        condition: service_started
      ttc-sandbox:
        condition: service_started

  ttc-sandbox:
    # Dify 1.13.x 호환 sandbox. langgenius/dify-sandbox:0.2.10 기준.
    # ttc-allinone 의 dify-api 가 CODE_EXECUTION_ENDPOINT 로 호출.
    # API_KEY 는 dify-api 와 일치해야 한다 (compose env 의 CODE_EXECUTION_API_KEY).
    image: ${SANDBOX_IMAGE:-langgenius/dify-sandbox:0.2.10}
    container_name: ttc-sandbox
    restart: unless-stopped
    platform: linux/arm64
    environment:
      API_KEY: "${SANDBOX_API_KEY:-dify-sandbox}"
      GIN_MODE: "release"
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      SANDBOX_PORT: "8194"
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:8194/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ttc-net

  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:18.11.0-ce.0}
    container_name: ttc-gitlab
    restart: unless-stopped
    hostname: gitlab
    # 공식 gitlab/gitlab-ce 가 arm64 manifest 를 제공하므로 별도 서드파티 arm64
    # 포트 없이 동일 이미지를 사용한다.
    platform: linux/arm64
    environment:
      TZ: Asia/Seoul
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-ChangeMe!Pass}
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab'
        gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
        gitlab_rails['gitlab_signup_enabled'] = false
        gitlab_rails['gitlab_default_can_create_group'] = true
        puma['worker_processes'] = 2
        sidekiq['max_concurrency'] = 10
        prometheus_monitoring['enable'] = false
        gitlab_exporter['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        alertmanager['enable'] = false
        # grafana['enable'] = false  # GitLab 16.3+ 에서 grafana 옵션 제거됨 (#383951)
    ports:
      - "28090:80"
      - "28022:22"
    volumes:
      - ${HOME}/ttc-allinone-data/gitlab/config:/etc/gitlab
      - ${HOME}/ttc-allinone-data/gitlab/logs:/var/log/gitlab
      - ${HOME}/ttc-allinone-data/gitlab/data:/var/opt/gitlab
    shm_size: 256m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost/users/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4g
    networks:
      - ttc-net

networks:
  ttc-net:
    driver: bridge
    name: ttc-net
