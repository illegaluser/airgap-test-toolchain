# =============================================================================
# DSCORE Zero-Touch QA — Dify Chatflow DSL (v0.1.4)
#
# 수동 import: Dify 콘솔 → 스튜디오 → 앱 만들기 → DSL 파일에서 가져오기
#
# 모델: 호스트 Ollama 모드 기본 가정 — `gemma4:e4b` 로 고정
#   호스트 머신에 `gemma4:e4b` 가 설치되어 있어야 하고,
#   Dify 콘솔의 Ollama 공급자에도 동일 Model Name 으로 등록되어 있어야 한다.
#   다른 모델을 쓰려면 아래 Planner/Healer LLM 노드의 `name:` 을 일괄 교체한다.
#
# Chatflow 구조:
#   Start → IF/ELSE ─── IF (run_mode = heal) ──→ Healer LLM → Answer (Heal)
#                    └── ELSE (chat / doc)  ──→ Planner LLM → Answer (Plan)
# =============================================================================

kind: app
version: 0.1.3
app:
  description: 'Zero-Touch QA — 자연어/기획서를 14대 DSL 계약으로 변환하고 실패 시 자가 치유 셀렉터를 제안한다.'
  icon: robot
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: ZeroTouch QA Brain
  use_icon_as_answer_icon: false

workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false

  graph:
    # ──────────────────────────────────────────
    # 엣지 (노드 간 연결 관계)
    # ──────────────────────────────────────────
    edges:
      - data:
          isInIteration: false
          sourceType: start
          targetType: if-else
        id: edge-start-to-ifelse
        source: start
        sourceHandle: source
        target: ifelse
        targetHandle: target
        type: custom
        zIndex: 0

      - data:
          isInIteration: false
          sourceType: if-else
          targetType: llm
        id: edge-ifelse-to-healer
        source: ifelse
        sourceHandle: "true"
        target: healer
        targetHandle: target
        type: custom
        zIndex: 0

      - data:
          isInIteration: false
          sourceType: if-else
          targetType: llm
        id: edge-ifelse-to-planner
        source: ifelse
        sourceHandle: "false"
        target: planner
        targetHandle: target
        type: custom
        zIndex: 0

      - data:
          isInIteration: false
          sourceType: llm
          targetType: answer
        id: edge-healer-to-answer
        source: healer
        sourceHandle: source
        target: answer-heal
        targetHandle: target
        type: custom
        zIndex: 0

      - data:
          isInIteration: false
          sourceType: llm
          targetType: answer
        id: edge-planner-to-answer
        source: planner
        sourceHandle: source
        target: answer-plan
        targetHandle: target
        type: custom
        zIndex: 0

    # ──────────────────────────────────────────
    # 노드
    # ──────────────────────────────────────────
    nodes:

      # ── Start 노드 ──────────────────────────
      - data:
          desc: ''
          selected: false
          title: Start
          type: start
          variables:
            - label: run_mode
              max_length: 48
              options:
                - chat
                - doc
                - heal
              required: true
              type: select
              variable: run_mode
            - label: srs_text
              # 20000 chars 확장: 클라이언트가 PDF 텍스트를 추출해 srs_text 에 prepend 하는
              # 경로 ([첨부 문서 내용] ... [추가 요구사항]) 를 지원하기 위함. pymupdf 가
              # 뽑은 30-스텝 PDF 가 ~2.1KB 이고, DIFY_DOC_MAX_CHARS 기본 12000 과 사용자
              # SRS 여유를 합쳐 안전 마진.
              max_length: 20000
              options: []
              required: false
              type: paragraph
              variable: srs_text
            - label: target_url
              max_length: 256
              options: []
              required: false
              type: text-input
              variable: target_url
            - label: error
              max_length: 2000
              options: []
              required: false
              type: paragraph
              variable: error
            - label: dom
              max_length: 10000
              options: []
              required: false
              type: paragraph
              variable: dom
            - label: failed_step
              max_length: 2000
              options: []
              required: false
              type: paragraph
              variable: failed_step
        height: 310
        id: start
        position:
          x: 80
          y: 260
        positionAbsolute:
          x: 80
          y: 260
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244

      # ── IF/ELSE 노드 ─────────────────────────
      - data:
          cases:
            - case_id: "true"
              conditions:
                - comparison_operator: is
                  id: cond-run-mode-heal
                  value: heal
                  variable_selector:
                    - start
                    - run_mode
              id: "true"
              logical_operator: and
          desc: 'run_mode = heal → Healer / 그 외 → Planner'
          selected: false
          title: IF/ELSE
          type: if-else
        height: 126
        id: ifelse
        position:
          x: 390
          y: 260
        positionAbsolute:
          x: 390
          y: 260
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244

      # ── Planner LLM 노드 ─────────────────────
      - data:
          context:
            enabled: false
            variable_selector: []
          desc: '자연어/기획서 → 14대 DSL JSON 배열 생성'
          memory:
            query_prompt_template: ''
            role_prefix:
              assistant: ''
              user: ''
            window:
              enabled: false
              size: 50
          model:
            completion_params:
              temperature: 0.1
              max_tokens: 1024
            mode: chat
            name: "gemma4:e4b"
            provider: ollama
          prompt_template:
            - id: planner-system
              role: system
              text: |
                당신은 Playwright 기반의 E2E 테스트 자동화 아키텍트입니다. 
                사용자의 자연어 요구사항(SRS)을 분석하여, 브라우저를 제어할 수 있는 [14대 표준 액션] 기반의 JSON 시나리오 배열을 작성하십시오.

                [반드시 지킬 것]
                - step 1 은 항상 navigate 입니다:
                  { "step": 1, "action": "navigate", "target": "", "value": "<target_url>", "description": "대상 페이지 로드" }
                - target_url 값을 step 1 value 에 그대로 넣습니다.
                - JSON 배열([...])만 출력합니다. 마크다운, 부연 설명, `<think>` 류 내부 추론 텍스트는 금지합니다.
                - 각 step 은 `step`, `action`, `target`, `value`, `description`, `fallback_targets` 를 포함합니다.
                - `condition` 은 verify 에서만 선택적으로 사용합니다.
                - `action_alternatives` 는 press Enter/Escape 처럼 대체 액션이 명백할 때만 선택적으로 넣습니다.

                [14대 표준 액션]
                - navigate, click, fill, press, select, check, hover, wait, verify, upload, drag, scroll, mock_status, mock_data
                - verify: 텍스트 검증이면 value 사용, 상태 검증이면 condition=`visible|hidden|disabled|enabled|checked|value`
                - scroll: value 는 `"into_view"` 고정
                - mock_status / mock_data: target 은 API URL 패턴이며 반드시 실제 API 호출보다 먼저 배치합니다.

                [작성 규칙]
                - `role+name`, `text=`, `label=`, `placeholder=` 같은 시맨틱 로케이터를 우선 사용합니다.
                - name 없는 단독 role (`role=button`, `role=link`) 은 금지합니다.
                - 복잡한 CSS/XPath 추측은 금지합니다.
                - `wait` 는 최소화하고 상태 확인은 `verify` 로 표현합니다.
                - `press` 의 키 이름은 target 이 아니라 value 에 넣습니다.
                - `verify` 에서 value 가 비어 있으면 condition 을 함께 넣습니다.
                - "첫 번째 검색결과 링크 클릭" 같은 동적 항목 클릭은
                  `target: "main a[href]:visible"` 와
                  `fallback_targets: ["article a[href]:visible", "[id*='result' i] a[href]:visible", "[class*='result' i] a[href]:visible"]`
                  를 우선 사용합니다.

                [✅ 복합 시나리오 예시 (네트워크 모킹 및 검증)]
                입력: "프로필 저장 API에서 500 에러 발생 시 에러 팝업 노출 확인"
                출력:
                [
                  {"step": 1, "action": "navigate", "target": "", "value": "https://example.com/profile", "description": "대상 페이지 로드", "fallback_targets": []},
                  {"step": 2, "action": "mock_status", "target": "**/api/profile", "value": "500", "description": "저장 API 500 에러 모킹", "fallback_targets": []},
                  {"step": 3, "action": "click", "target": "role=button, name=저장", "value": "", "description": "저장 버튼 클릭", "fallback_targets": ["text=저장", "[type='submit']"]},
                  {"step": 4, "action": "verify", "target": "text=저장에 실패했습니다", "value": "", "condition": "visible", "description": "에러 팝업 노출 검증", "fallback_targets": ["role=alert", "text=실패"]}
                ]
            - id: planner-user
              role: user
              text: "대상 URL: {{#start.target_url#}}\n요구사항: {{#start.srs_text#}}"
          selected: false
          title: Planner
          type: llm
          variables: []
          vision:
            enabled: false
        height: 98
        id: planner
        position:
          x: 700
          y: 380
        positionAbsolute:
          x: 700
          y: 380
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244

      # ── Healer LLM 노드 ──────────────────────
      - data:
          context:
            enabled: false
            variable_selector: []
          desc: 'DOM 분석 → 대체 셀렉터 JSON 제안'
          memory:
            query_prompt_template: ''
            role_prefix:
              assistant: ''
              user: ''
            window:
              enabled: false
              size: 50
          model:
            completion_params:
              temperature: 0.1
              max_tokens: 768
            mode: chat
            name: "gemma4:e4b"
            provider: ollama
          prompt_template:
            - id: healer-system
              role: system
              text: |
                당신은 자가 치유(Self-Healing) 시스템입니다. 에러 메시지, 실패한 스텝 정보, 그리고 HTML DOM 스냅샷을 분석하십시오.

                [작업]:
                - 실패한 스텝(failed_step)의 원래 액션과 타겟을 확인하십시오.
                - 에러 메시지를 바탕으로 기존 요소를 찾지 못한 이유를 파악하십시오.
                - DOM 스냅샷 내에서 의도에 가장 부합하는 대체 셀렉터를 찾으십시오.
                - ⚠️ 무조건 DOM에 실제로 존재하는 요소만 제안하십시오. 가상의 셀렉터는 절대 금지합니다.
                - DOM 스냅샷은 일부만 전달될 수 있으므로, 긴 XPath 대신 짧고 안정적인 시맨틱 셀렉터를 우선하십시오.

                [신규 액션별 치유 전략]:
                - action이 "drag"인 경우: 소스(target)와 목적지(value) 중 어느 것을 못 찾았는지 에러에서 파악하십시오. 목적지 오류라면 새 로케이터를 "value" 키에 담아 반환하십시오.
                - action이 "upload"인 경우: 겉모양이 버튼이더라도 실제로는 `<input type="file">` 속성을 가진 숨겨진 요소를 찾아 제안해야 합니다.
                - action이 "mock_status" / "mock_data"인 경우: DOM 탐색 오류가 아닙니다. 에러를 바탕으로 타겟 URL 패턴(target)의 오타나 정규식을 교정하십시오.

                [로케이터 작성 원칙]:
                - DOM을 분석할 때 복잡한 CSS/XPath 계층 구조보다, 변하지 않는 텍스트(`text=로그인`)나 시맨틱 속성(`role=button, name=확인`, `[placeholder="검색"]`)을 최우선으로 제안하십시오.

                [출력 형식]:
                - 순수 JSON 객체({...}) 형식으로만 출력하십시오. 부연 설명 금지.
                - 반드시 "target", "value", "fallback_targets" 세 개의 키를 모두 포함하십시오.
                - "value" 키는 목적지(drag)나 입력값이 변경될 필요가 있을 때만 값을 넣고, 그 외에는 빈 문자열("")을 넣으십시오.

                [✅ 예시 (click 액션 실패 치유)]
                {"target": "role=button, name=Submit", "value": "", "fallback_targets": ["text=Submit", "#submit-btn"]}

                [엄수 사항]:
                - ⚠️ <think>, <thinking>, <reasoning> 등의 내부 추론 블록을 절대 출력하지 마십시오.
                  바로 JSON 객체만 응답하십시오.
            - id: healer-user
              role: user
              text: "에러: {{#start.error#}}\n\n실패한 스텝:\n{{#start.failed_step#}}\n\nDOM 스냅샷:\n{{#start.dom#}}"
          selected: false
          title: Healer
          type: llm
          variables: []
          vision:
            enabled: false
        height: 98
        id: healer
        position:
          x: 700
          y: 130
        positionAbsolute:
          x: 700
          y: 130
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244

      # ── Answer (Heal) 노드 ───────────────────
      - data:
          answer: "{{#healer.text#}}"
          desc: ''
          selected: false
          title: Answer (Heal)
          type: answer
          variables: []
        height: 107
        id: answer-heal
        position:
          x: 1010
          y: 130
        positionAbsolute:
          x: 1010
          y: 130
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244

      # ── Answer (Plan) 노드 ───────────────────
      - data:
          answer: "{{#planner.text#}}"
          desc: ''
          selected: false
          title: Answer (Plan)
          type: answer
          variables: []
        height: 107
        id: answer-plan
        position:
          x: 1010
          y: 380
        positionAbsolute:
          x: 1010
          y: 380
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244
