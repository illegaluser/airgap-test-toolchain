<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>[fixture] mock_data</title>
</head>
<body>
  <h1>mock_data fixture</h1>
  <button id="load-btn" type="button">load list</button>
  <div id="empty" style="display:none">데이터 없음</div>
  <ul id="list"></ul>

  <script>
    document.getElementById("load-btn").addEventListener("click", async function () {
      var ul = document.getElementById("list");
      var emptyMsg = document.getElementById("empty");
      ul.innerHTML = "";
      emptyMsg.style.display = "none";

      var res = await fetch("https://api.example.test/api/list");
      var body = await res.json();
      var items = (body && body.items) || [];

      if (items.length === 0) {
        emptyMsg.style.display = "block";
        return;
      }

      items.forEach(function (it) {
        var li = document.createElement("li");
        li.textContent = it.name + ":" + it.value;
        ul.appendChild(li);
      });
    });
  </script>
</body>
</html>
