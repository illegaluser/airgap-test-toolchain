<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Isolation fixture A — write side</title>
</head>
<body>
  <h1 id="role">A</h1>
  <p>이 페이지는 cookie / localStorage / sessionStorage / IndexedDB 에 흔적을 남깁니다.</p>
  <button id="write-btn">Write all</button>
  <p id="status">idle</p>
  <script>
    async function writeAll() {
      // cookie — 같은 origin file:// 에서는 안 들어가므로 generic path 만 시도.
      try { document.cookie = "isolation_marker=A; path=/"; } catch (_) {}
      try { localStorage.setItem("isolation_local", "A"); } catch (_) {}
      try { sessionStorage.setItem("isolation_session", "A"); } catch (_) {}

      try {
        const req = indexedDB.open("isolation_db", 1);
        await new Promise((resolve) => {
          req.onupgradeneeded = () => {
            req.result.createObjectStore("kv", { keyPath: "k" });
          };
          req.onsuccess = () => {
            const tx = req.result.transaction("kv", "readwrite");
            tx.objectStore("kv").put({ k: "marker", v: "A" });
            tx.oncomplete = () => { req.result.close(); resolve(); };
            tx.onerror = () => { req.result.close(); resolve(); };
          };
          req.onerror = () => resolve();
        });
      } catch (_) { /* no-op */ }

      document.getElementById("status").textContent = "written";
    }
    document.getElementById("write-btn").addEventListener("click", writeAll);
    // headless 자동 트리거 — verify 없이도 status 가 'written' 으로 바뀐다.
    writeAll();
  </script>
</body>
</html>
