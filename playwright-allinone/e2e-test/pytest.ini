[pytest]
testpaths = .
pythonpath = .. ../shared ../recording-ui ../replay-ui
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:cacheprovider
markers =
    unit: pre-commit slot — AST/string deterministic, no browser, < 1s/case
    integration: pre-push slot — Playwright + fixtures HTML, no daemon
    flow: pre-push slot — Recording UI + Replay UI daemon round-trip
    selftest_build: build-time slot — invoked by ./build.sh
    selftest_receive: receiving-PC slot — invoked by Launch-ReplayUI
