name: External SUT bench

# 트랙 2 Phase B2 — 공개 안정 사이트 시나리오 N회 반복 실행 → flake rate dashboard.
# 매일 cron 또는 수동 트리거.
#
# 출력:
# - artifact `bench-results-<run_id>` : results/<date>/runs.jsonl
# - artifact `bench-dashboard-<run_id>` : dashboards/index.html
#
# 폐쇄망 본체 솔루션의 *외부 검증 트랙* — GitHub 클라우드 러너에서만 동작
# (외부 도메인 접속 필요).

on:
  schedule:
    # 매일 03:00 UTC = 12:00 KST. 외부 사이트 트래픽 적은 시간대.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      runs:
        description: "시나리오당 반복 횟수"
        required: false
        default: "3"
      site:
        description: "특정 사이트만 실행 (sites/ 하위 디렉토리 이름, 비우면 전체)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            playwright-allinone/requirements.txt
            playwright-allinone/test/requirements.txt

      - name: Install dependencies
        working-directory: playwright-allinone
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test/requirements.txt
          python -m playwright install --with-deps chromium

      # 이전 cron 실행 결과 (있다면) 가져오기 — 7일 시계열 보존.
      # GitHub Actions artifact 는 90일 보관이므로 직전 실행만 복원.
      - name: Restore previous results (best-effort)
        id: restore
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bench-results-latest
          path: playwright-allinone/test/bench/results/

      - name: Run flake_runner
        working-directory: playwright-allinone
        env:
          PYTHONPATH: shared:recording-ui:replay-ui
        run: |
          RUNS="${{ github.event.inputs.runs || '3' }}"
          SITE="${{ github.event.inputs.site || '' }}"
          ARGS="--runs $RUNS"
          if [ -n "$SITE" ]; then
            ARGS="$ARGS --site $SITE"
          fi
          # flake_runner 의 exit code 는 fail 시 1 — dashboard 는 어차피 생성하므로
          # || true 로 step 자체는 통과시킴.
          python -m test.bench.flake_runner $ARGS || true

      - name: Generate dashboard
        working-directory: playwright-allinone
        env:
          PYTHONPATH: shared:recording-ui:replay-ui
        run: |
          python -m test.bench.dashboard

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          # 'latest' alias — 다음 실행에서 download-artifact 가 복원.
          name: bench-results-latest
          path: playwright-allinone/test/bench/results/
          retention-days: 30
          overwrite: true

      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: bench-dashboard-${{ github.run_id }}
          path: playwright-allinone/test/bench/dashboards/
          retention-days: 90
