name: Build monitor-runtime

# 태그 push (`monitor-runtime-vX.Y.Z`) 또는 수동 트리거 시 monitor-runtime-<ts>.zip
# 을 빌드 + Release 첨부. CI 머신은 Linux 면 충분 — Playwright 가 cross-fetch 함.

on:
  push:
    tags:
      - "monitor-runtime-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build monitor-runtime zip
        run: |
          chmod +x playwright-allinone/monitor-build/build-monitor-runtime.sh
          bash playwright-allinone/monitor-build/build-monitor-runtime.sh --target all

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor-runtime
          path: monitor-runtime-*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: monitor-runtime-*.zip
          fail_on_unmatched_files: true
